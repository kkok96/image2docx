<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片转 Word</title>
  <meta name="description" content="上传图片，生成排版精美的 Word 文档">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>">

  <script src="https://cdn.jsdelivr.net/npm/docx@8.5/build/index.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.6/Sortable.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    header h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    header p { font-size: 14px; opacity: 0.85; }

    main { max-width: 960px; margin: 0 auto; padding: 24px 20px 60px; }

    /* 上传区域 */
    #uploadZone {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 48px 20px;
      text-align: center;
      background: #fafafa;
      transition: all 0.25s;
      cursor: pointer;
      user-select: none;
    }
    #uploadZone:hover,
    #uploadZone.dragover {
      border-color: #667eea;
      background: #eef1ff;
    }
    #uploadZone .icon { font-size: 44px; margin-bottom: 10px; }
    #uploadZone .title { font-size: 16px; font-weight: 600; color: #555; margin-bottom: 4px; }
    #uploadZone .hint { font-size: 13px; color: #999; }

    /* 工具栏 */
    #toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 20px 0 12px;
      flex-wrap: wrap;
      gap: 10px;
    }
    #toolbar .count { font-weight: 600; color: #555; }
    #toolbar .link-btn {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
    }
    #toolbar .link-btn:hover { text-decoration: underline; }

    /* 画廊 */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .image-card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: box-shadow 0.2s, transform 0.15s;
      position: relative;
    }
    .image-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.11); }
    .image-card .thumbnail {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      background: #eee;
    }
    .drag-handle {
      position: absolute;
      top: 6px;
      left: 6px;
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.35);
      color: #fff;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      font-size: 16px;
      z-index: 2;
      line-height: 1;
      user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }

    .image-card .delete-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 28px;
      height: 28px;
      background: rgba(231,76,60,0.8);
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: background 0.2s;
    }
    .image-card .delete-btn:hover { background: #e74c3c; }

    .image-card .card-body { padding: 10px 12px; }
    .image-card .card-body input[type="text"] {
      width: 100%;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .image-card .card-body input[type="text"]:focus { border-color: #667eea; }
    .image-card .card-body input[type="text"]::placeholder { color: #bbb; }

    .image-card .card-footer {
      padding: 8px 12px;
      font-size: 11px;
      color: #999;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #f5f5f5;
    }

    .sortable-ghost {
      opacity: 0.35;
      outline: 2px dashed #667eea;
      outline-offset: -2px;
      border-radius: 10px;
    }
    .sortable-chosen { opacity: 0.85; }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #bbb;
      font-size: 14px;
    }

    /* 设置面板 */
    #settingsPanel { margin-bottom: 20px; }
    #settingsPanel details {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    #settingsPanel summary {
      padding: 14px 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      color: #555;
      user-select: none;
    }
    #settingsPanel summary:hover { background: #fafafa; }
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 20px;
      padding: 0 20px 18px;
    }
    @media (max-width: 500px) { .settings-grid { grid-template-columns: 1fr; } }
    .settings-grid label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #555;
      flex-wrap: wrap;
    }
    .settings-grid input[type="range"] { flex: 1; min-width: 100px; }
    .settings-grid select {
      padding: 5px 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 13px;
      background: #fff;
    }
    .settings-grid input[type="checkbox"] { width: 16px; height: 16px; accent-color: #667eea; }

    /* 生成按钮 */
    #actionSection { text-align: center; }
    #generateBtn {
      width: 100%;
      max-width: 500px;
      padding: 16px 24px;
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(102,126,234,0.35);
    }
    #generateBtn:hover { opacity: 0.9; transform: translateY(-1px); }
    #generateBtn:active { transform: translateY(0); }
    #generateBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    #generateBtn.empty { opacity: 0.55; }
    .hint-text { font-size: 13px; color: #999; margin-top: 8px; }

    /* 响应式 */
    @media (max-width: 600px) {
      .gallery { grid-template-columns: 1fr 1fr; gap: 10px; }
      .image-card .thumbnail { height: 130px; }
      header { padding: 28px 16px 16px; }
      header h1 { font-size: 22px; }
      main { padding: 16px 12px 40px; }
    }
    @media (max-width: 380px) {
      .gallery { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🖼️ 图片转 Word</h1>
    <p>上传图片 &middot; 调整顺序 &middot; 一键生成 Word 文档</p>
  </header>

  <main>
    <!-- 上传区域 -->
    <div id="uploadZone">
      <input type="file" id="fileInput" multiple accept="image/*" hidden>
      <div class="icon">📁</div>
      <div class="title">选择图片或将图片拖拽到这里</div>
      <div class="hint">支持 JPG / PNG / WebP，可一次选择多张</div>
    </div>

    <!-- 工具栏 -->
    <div id="toolbar">
      <span class="count" id="countDisplay">暂无图片</span>
      <button id="clearBtn" class="link-btn" style="display:none">清空全部</button>
    </div>

    <!-- 图片画廊 -->
    <div id="gallery" class="gallery"></div>

    <!-- 设置面板 -->
    <div id="settingsPanel" style="display:none">
      <details>
        <summary>⚙️ 页面设置</summary>
        <div class="settings-grid">
          <label>
            <input type="checkbox" id="perPageChk" checked>
            每张图片单独一页
          </label>
          <label>
            图片最大宽度: <span id="imgWidthVal">600px</span>
            <input type="range" id="imgWidthRange" min="200" max="1000" value="600" step="10">
          </label>
          <label>
            纸张方向:
            <select id="orientationSel">
              <option value="portrait">纵向 (A4)</option>
              <option value="landscape">横向 (A4)</option>
            </select>
          </label>
          <label>
            图片对齐:
            <select id="alignSel">
              <option value="center" selected>居中</option>
              <option value="left">左对齐</option>
              <option value="right">右对齐</option>
            </select>
          </label>
        </div>
      </details>
    </div>

    <!-- 生成区域 -->
    <div id="actionSection">
      <button id="generateBtn" class="empty">📥 生成 Word 文档并下载</button>
      <p class="hint-text" id="sizeHint"></p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
