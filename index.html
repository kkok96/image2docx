<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片转Word · 在线工具</title>
  <script src="https://unpkg.com/docx@8.5.0/build/index.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 700px;
      padding: 40px;
    }
    h1 {
      font-size: 26px;
      color: #1a1a2e;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 span { font-size: 28px; }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .dropzone {
      border: 2px dashed #bbb;
      border-radius: 16px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: #fafbfc;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: #5b6abf;
      background: #f0f2ff;
    }
    .dropzone .icon { font-size: 48px; margin-bottom: 12px; }
    .dropzone p { color: #555; font-size: 16px; }
    .dropzone .hint { color: #999; font-size: 13px; margin-top: 8px; }
    .preview-area {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
      margin-top: 20px;
      min-height: 60px;
    }
    .preview-item {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 1;
      background: #eee;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .preview-item .remove {
      position: absolute;
      top: 4px; right: 4px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .preview-item .order {
      position: absolute;
      bottom: 4px; left: 4px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 6px;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .btn {
      flex: 1;
      min-width: 140px;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary {
      background: #5b6abf;
      color: #fff;
    }
    .btn-primary:hover { background: #4a59b0; transform: translateY(-1px); }
    .btn-primary:disabled {
      background: #b0b8d9;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: #eef0f5;
      color: #444;
    }
    .btn-secondary:hover { background: #e2e5ed; }
    .btn-clear {
      background: #fee2e2;
      color: #b91c1c;
    }
    .btn-clear:hover { background: #fecaca; }
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .status.show { display: block; }
    .status.ok { background: #d1fae5; color: #065f46; }
    .status.err { background: #fee2e2; color: #991b1b; }
    .status.info { background: #dbeafe; color: #1e40af; }
    .filename-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      margin-top: 12px;
      outline: none;
      transition: border 0.2s;
    }
    .filename-input:focus { border-color: #5b6abf; }
    @media (max-width: 480px) {
      .container { padding: 24px; }
      .actions { flex-direction: column; }
      .btn { min-width: auto; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1><span>🖼️</span> 图片转 Word</h1>
  <p class="subtitle">上传图片，一键导出为 Word 文档（.docx）</p>

  <div class="dropzone" id="dropzone">
    <div class="icon">📁</div>
    <p>点击上传或拖拽图片到这里</p>
    <div class="hint">支持 JPG / PNG / WebP / GIF，可多选</div>
    <input type="file" accept="image/*" multiple id="fileInput" style="display:none">
  </div>

  <div class="preview-area" id="previewArea"></div>

  <input type="text" class="filename-input" id="filenameInput" placeholder="文件名（可选，默认为「我的文档」）" />

  <div class="actions">
    <button class="btn btn-primary" id="exportBtn">📄 导出 Word</button>
    <button class="btn btn-clear" id="clearBtn">🗑️ 清空</button>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
(function() {
  const images = [];

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const previewArea = document.getElementById('previewArea');
  const exportBtn = document.getElementById('exportBtn');
  const clearBtn = document.getElementById('clearBtn');
  const filenameInput = document.getElementById('filenameInput');
  const statusEl = document.getElementById('status');

  function showStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status show ' + (type || 'info');
  }
  function hideStatus() { statusEl.className = 'status'; }

  function render() {
    previewArea.innerHTML = '';
    images.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'preview-item';
      div.innerHTML = `
        <img src="${item.dataUrl}" alt="图片${i+1}">
        <button class="remove" data-index="${i}">×</button>
        <span class="order">${i+1}</span>
      `;
      previewArea.appendChild(div);
    });
    previewArea.querySelectorAll('.remove').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const idx = parseInt(this.dataset.index);
        images.splice(idx, 1);
        render();
        hideStatus();
        if (images.length === 0) exportBtn.disabled = true;
      });
    });
    exportBtn.disabled = images.length === 0;
  }

  function addFiles(files) {
    if (!files || files.length === 0) return;
    const valid = [];
    for (const f of files) {
      if (!f.type.startsWith('image/')) continue;
      valid.push(f);
    }
    if (valid.length === 0) {
      showStatus('没有找到图片文件，请上传 JPG/PNG/WebP/GIF 格式', 'err');
      return;
    }
    let loaded = 0;
    valid.forEach(f => {
      const reader = new FileReader();
      reader.onload = (e) => {
        images.push({ dataUrl: e.target.result, file: f });
        loaded++;
        if (loaded === valid.length) { render(); hideStatus(); }
      };
      reader.onerror = () => {
        loaded++;
        showStatus(`读取 ${f.name} 失败`, 'err');
        if (loaded === valid.length) render();
      };
      reader.readAsDataURL(f);
    });
  }

  dropzone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    addFiles(e.target.files);
    fileInput.value = '';
  });

  dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropzone.classList.add('dragover');
  });
  dropzone.addEventListener('dragleave', () => {
    dropzone.classList.remove('dragover');
  });
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    addFiles(e.dataTransfer.files);
  });

  clearBtn.addEventListener('click', () => {
    images.length = 0;
    previewArea.innerHTML = '';
    exportBtn.disabled = true;
    hideStatus();
  });

  exportBtn.addEventListener('click', async () => {
    if (images.length === 0) {
      showStatus('请先上传图片', 'err');
      return;
    }
    exportBtn.disabled = true;
    exportBtn.textContent = '⏳ 生成中...';
    showStatus('正在生成 Word 文档...', 'info');

    try {
      const { Document, Packer, Paragraph, ImageRun } = window.docx;

      const imageParagraphs = [];

      for (let i = 0; i < images.length; i++) {
        const item = images[i];
        try {
          const resp = await fetch(item.dataUrl);
          const blob = await resp.blob();
          const arrayBuffer = await blob.arrayBuffer();

          const img = new Image();
          img.src = item.dataUrl;
          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
          });

          const maxWidth = 451;
          const maxHeight = 600;
          let w = img.naturalWidth;
          let h = img.naturalHeight;
          if (w > maxWidth) { h = (maxWidth / w) * h; w = maxWidth; }
          if (h > maxHeight) { w = (maxHeight / h) * w; h = maxHeight; }

          let mime = item.file ? item.file.type : 'image/png';
          if (mime === 'image/webp') mime = 'image/png';

          imageParagraphs.push(
            new Paragraph({
              spacing: { after: 200 },
              alignment: 'center',
              children: [
                new ImageRun({
                  data: arrayBuffer,
                  transformation: { width: Math.round(w * 1.33), height: Math.round(h * 1.33) },
                  type: ImageRun.imageType[mime.replace('image/', '').toUpperCase()] || ImageRun.imageType.PNG,
                })
              ],
            })
          );
        } catch (err) {
          console.error(`处理第 ${i+1} 张图片失败:`, err);
          showStatus(`第 ${i+1} 张图片处理失败，请重试`, 'err');
          exportBtn.disabled = false;
          exportBtn.textContent = '📄 导出 Word';
          return;
        }
      }

      const doc = new Document({
        title: '图片文档',
        description: '由小可工具生成',
        sections: [{
          properties: {
            page: {
              margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 },
            }
          },
          children: imageParagraphs,
        }],
      });

      const blobOut = await Packer.toBlob(doc);
      const fileName = (filenameInput.value.trim() || '我的文档') + '.docx';

      const link = document.createElement('a');
      link.href = URL.createObjectURL(blobOut);
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(link.href), 10000);

      showStatus(`✅ ${fileName} 下载成功！共 ${images.length} 张图片`, 'ok');
    } catch (err) {
      console.error('导出失败:', err);
      showStatus('导出失败：' + (err.message || '未知错误'), 'err');
    } finally {
      exportBtn.disabled = false;
      exportBtn.textContent = '📄 导出 Word';
    }
  });

  exportBtn.disabled = true;
})();
</script>
</body>
</html>
